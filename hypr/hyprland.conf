bind = SUPER, Q, exec, alacritty # open kitty terminal
bind = SUPER, C, killactive # close a window
bind = SUPER, M, exit
bind = SUPER, E, exec, dolphin
bind = SUPER, R, exec, wofi --show drun
bind = SUPER SHIFT, E, exit # logout
bind = SUPER, V, togglefloating

monitor=,preferred,auto,1

general {
	border_size = 0
	gaps_in = 1
	gaps_out = 0
	resize_on_border = true
}

animations {
	# enabled = false
	 # All this animation stuff was generated by gemini, idk what it does, 
	 # but it satifies my needs

	 # Fast-starting Bezier curves
    bezier = smoothFast, 0.25, 1, 0.5, 1
    bezier = fluidEase, 0.4, 0, 0.2, 1

    # Animation = name, enabled, speed (in deciseconds), curve [, style]
    animation = windows, 1, 3, smoothFast, popin 60%
    animation = windowsIn, 1, 3, smoothFast, popin 60%
    animation = windowsOut, 1, 2.5, smoothFast, popin 60%
    animation = fade, 1, 2.5, fluidEase
    animation = workspaces, 1, 3.5, smoothFast, slidefade 20%
    animation = border, 1, 2, fluidEase
}

decoration {
	# rounding = 4
	inactive_opacity = 0.99
}

input {
	repeat_delay = 250
	repeat_rate = 60
}

bind = ALT, Tab, cyclenext
bind = SUPER, F, fullscreen, 1
bind = SUPER, A, fullscreen
bind = SUPER, 1, workspace, 1 # tmux/nvim/vim
bind = SUPER, 2, workspace, 2 # firefox
bind = SUPER, 3, workspace, 3 # somethings off
bind = SUPER, 4, workspace, 4 # btop
bind = SUPER, 5, workspace, 5 # btop


bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4

exec-once = hyprpaper &

exec-once = waybar &
# toggles waybar
# Toggle Waybar visibility (Show/Hide)
bind = SUPER, W, exec, killall -SIGUSR1 waybar
